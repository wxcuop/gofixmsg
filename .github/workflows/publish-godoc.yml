name: Publish GoDoc

on:
  push:
    branches:
      - main
    paths:
      - 'gofixmsg/**'
      - '.github/workflows/publish-godoc.yml'
  workflow_dispatch:

jobs:
  publish-docs:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Install doc2go
        run: go install go.abhg.dev/doc2go@latest

      - name: Generate docs with doc2go
        run: |
          mkdir -p out
          cd gofixmsg
          doc2go -out ../out ./...

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: out/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out/
          destination_dir: godoc
