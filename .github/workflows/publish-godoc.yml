name: Publish GoDoc

on:
  push:
    branches:
      - main
    paths:
      - 'gofixmsg/**'
      - '.github/workflows/publish-godoc.yml'
  workflow_dispatch:

jobs:
  publish-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Install pkgsite
        run: go install golang.org/x/pkgsite/cmd/pkgsite@latest

      - name: Generate API Documentation with pkgsite
        run: |
          mkdir -p docs/api
          cd gofixmsg
          
          # Generate documentation using pkgsite
          # pkgsite generates complete pkg.go.dev-style documentation
          pkgsite -o ../docs/api/index.html -list -dochtml github.com/wxcuop/gofixmsg
          
          # Also generate a landing page with package overview
          cat > ../docs/api/README.md << 'EOF'
          # GoFixMsg API Documentation
          
          Complete API documentation for GoFixMsg - a FIX protocol implementation in Go.
          
          ## Quick Links
          
          - [Full API Docs](index.html) - Complete package documentation
          - [GitHub Repository](https://github.com/wxcuop/pyfixmsg_plus)
          - [Developer Guide](https://github.com/wxcuop/pyfixmsg_plus/blob/main/gofixmsg/DEVELOPER.md)
          - [Examples](https://github.com/wxcuop/pyfixmsg_plus/tree/main/gofixmsg/examples)
          
          ## Core Packages
          
          - **engine** - FIX session engine and state management
          - **fixmsg** - FIX message parsing and serialization
          - **fixmsg/codec** - Message codec (wire format handling)
          - **fixmsg/spec** - QuickFIX XML specification loading
          - **handler** - Message handler framework
          - **network** - Network connection management (Initiator/Acceptor)
          - **state** - Session state machine
          - **store** - Message persistence (SQLite)
          - **heartbeat** - Heartbeat monitoring
          - **scheduler** - Task scheduling
          EOF

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v3
        with:
          name: godoc
          path: docs/api/
          retention-days: 30

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/api
          destination_dir: godoc
          enable_jekyll: false
