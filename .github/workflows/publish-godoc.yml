name: Publish GoDoc

on:
  push:
    branches:
      - main
    paths:
      - 'gofixmsg/**'
      - '.github/workflows/publish-godoc.yml'
  workflow_dispatch:

jobs:
  publish-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Install gopages
        run: go install github.com/johnstarich/go/cmd/gopages@latest

      - name: Generate API Documentation with gopages
        run: |
          mkdir -p docs/api
          cd gofixmsg
          gopages -out ../docs/api github.com/wxcuop/gofixmsg
          
          # List generated files
          echo "Generated documentation files:"
          ls -lh ../docs/api/
          
      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: godoc
          path: docs/api/
          retention-days: 30

      - name: Configure git for deployment
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/wxcuop/gofixmsg.git"

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/api
          destination_dir: godoc
          enable_jekyll: false
